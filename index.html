<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator-card">

    <h2>Interest Type</h2>

    <select id="interestType">
        <option value="si">Simple Interest</option>
        <option value="ciAnnually">CI Annually</option>
        <option value="ciHalfYearly">CI Half-Yearly</option>
    </select>

    <div class="input-group">
        <label>Principal</label>
        <input type="number" id="principal" placeholder="Enter amount">
    </div>

    <div class="input-group">
        <label>Rate Per Month (%)</label>
        <input type="number" id="rate" placeholder="e.g. 2.5">
    </div>

    <div class="input-group">
        <label>Date</label>
        <input type="date" id="startDate">
    </div>

    <button onclick="calculate()">Calculate</button>

    <!-- Date Display -->
    <p><strong>Date:</strong> <span id="displayDate"></span></p>

    <!-- Result Display -->
    <div id="displayArea" style="display:none; margin-top:10px;">
        <p><strong>Duration:</strong> <span id="resDuration"></span></p>
        <p>Total Interest: <strong id="resInterest"></strong></p>
        <p>Total Amount: <strong id="resTotal"></strong></p>
    </div>

    <!-- Explanation -->
    <div id="explanation" style="margin-top:15px;"></div>

</div>

<script src="script.js"></script>
</body>
</html>
